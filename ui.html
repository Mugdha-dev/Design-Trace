<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        --bg: #f6f7fb;
        --surface: #ffffff;
        --line: #e4e7ef;
        --text: #171a2f;
        --muted: #7b849b;
        --soft: #f3f5fa;
        --blue: #3563e9;
        --blue-soft: #eef3ff;
        --green: #0f9f55;
        --green-soft: #eaf8f0;
        --amber: #d97706;
        --amber-soft: #fff6df;
        --gray: #697386;
        --gray-soft: #f0f2f6;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .header {
        height: 48px;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 14px;
        background: var(--surface);
        border-bottom: 1px solid var(--line);
        font-weight: 750;
      }

      .back-button {
        width: 28px;
        height: 28px;
        min-height: 28px;
        padding: 0;
        margin: 0;
        border-radius: 6px;
        background: transparent;
        color: var(--muted);
        font-size: 16px;
      }

      .back-button:hover {
        background: var(--soft);
        color: var(--text);
      }

      .icon {
        width: 22px;
        height: 22px;
        border-radius: 6px;
        background: var(--blue);
        color: #fff;
        display: grid;
        place-items: center;
        font-size: 13px;
      }

      .content {
        padding: 16px;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 14px;
      }

      .stack {
        display: grid;
        gap: 12px;
      }

      .row {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .between {
        justify-content: space-between;
      }

      .eyebrow {
        color: var(--muted);
        font-size: 10px;
        font-weight: 400;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: 16px;
        line-height: 1.25;
      }

      h2 {
        font-size: 14px;
        line-height: 1.25;
      }

      p {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }

      button {
        border: 0;
        border-radius: 7px;
        cursor: pointer;
        font: inherit;
        font-size: 12px;
        font-weight: 400;
        min-height: 34px;
        padding: 0 10px;
      }

      .primary {
        width: 100%;
        background: var(--blue);
        color: #fff;
      }

      .secondary {
        width: 100%;
        background: transparent;
        color: var(--muted);
      }

      .ghost {
        background: var(--soft);
        color: var(--text);
      }

      .thumb {
        width: 58px;
        height: 42px;
        flex: 0 0 auto;
        border: 1px solid #dfe5ff;
        border-radius: 6px;
        background:
          linear-gradient(90deg, #cfd9ff 0 34%, transparent 34%),
          linear-gradient(90deg, #dce4ff 0 76%, transparent 76%),
          linear-gradient(90deg, #dce4ff 0 58%, transparent 58%),
          linear-gradient(90deg, #3563e9 0 32%, transparent 32%),
          #f1f4ff;
        background-size: 38px 5px, 44px 5px, 34px 5px, 22px 8px, auto;
        background-position: 8px 8px, 8px 18px, 8px 27px, 8px 34px, 0 0;
        background-repeat: no-repeat;
      }

      .chip,
      .tag {
        border-radius: 6px;
        display: inline-flex;
        align-items: center;
        min-height: 22px;
        padding: 0 7px;
        font-size: 11px;
        font-weight: 400;
      }

      .chip {
        background: var(--soft);
        color: var(--gray);
        border: 1px solid var(--line);
      }

      .tag {
        background: var(--blue-soft);
        color: var(--blue);
      }

      .score {
        position: absolute;
        top: 9px;
        right: 9px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 400;
        min-width: 36px;
        padding: 3px 5px;
        text-align: center;
      }

      .score.high {
        background: var(--green-soft);
        color: var(--green);
        border: 1px solid #a8edc4;
      }

      .score.medium {
        background: var(--amber-soft);
        color: var(--amber);
        border: 1px solid #ffd76a;
      }

      .score.low {
        background: var(--gray-soft);
        color: var(--gray);
        border: 1px solid var(--line);
      }

      .match-row {
        display: block;
        width: 100%;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 9px;
        text-align: left;
        position: relative;
        cursor: pointer;
        font: inherit;
      }

      .match-row:hover {
        border-color: #bcc9ff;
        background: #fbfcff;
      }

      .match-row.expanded {
        border-color: var(--blue);
        background: #fbfcff;
      }

      .match-actions {
        display: none;
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid var(--line);
      }

      .match-row.expanded .match-actions {
        display: grid;
        gap: 8px;
      }

      .btn-flag {
        background: #fdecec;
        color: #c0392b;
      }

      .btn-flag:hover {
        background: #fbd9d9;
      }

      .btn-review {
        background: #e8f8ef;
        color: #0f9f55;
      }

      .btn-review:hover {
        background: #d5f3e3;
      }

      .action-hint {
        font-size: 11px;
        line-height: 1.4;
        margin: 0 0 2px;
      }

      .filters {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }

      .match-copy {
        min-width: 0;
        flex: 1;
      }

      .match-copy h2 {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .tags {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-top: 7px;
      }

      .summary {
        border-bottom: 1px solid var(--line);
        margin: -16px -16px 12px;
        padding: 16px;
        background: var(--surface);
      }

      .empty {
        min-height: 420px;
        display: grid;
        place-items: center;
        text-align: center;
      }

      .empty-inner {
        display: grid;
        gap: 12px;
        width: 100%;
      }

      .empty-icon {
        width: 46px;
        height: 46px;
        border-radius: 10px;
        background: var(--blue-soft);
        color: var(--blue);
        display: grid;
        place-items: center;
        margin: 0 auto;
        font-size: 22px;
      }

      .settings {
        border-top: 1px solid var(--line);
        margin-top: 10px;
        padding-top: 10px;
      }

      .settings-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 8px;
      }

      label {
        align-items: center;
        display: flex;
        gap: 6px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 400;
      }

      .step {
        align-items: center;
        display: flex;
        gap: 8px;
        color: var(--muted);
        font-size: 12px;
      }

      .dot {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
        border-radius: 999px;
        background: var(--blue-soft);
        color: var(--blue);
        display: grid;
        place-items: center;
        font-size: 10px;
        font-weight: 900;
      }

      .footer-note {
        border-top: 1px solid var(--line);
        bottom: 0;
        color: #a5adbf;
        font-size: 11px;
        margin: 16px -16px -16px;
        padding: 10px 16px;
      }

      .loader {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
        border: 2px solid var(--blue-soft);
        border-top-color: var(--blue);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      .progress-text {
        color: var(--muted);
        font-size: 11px;
      }

      .page-indicator {
        color: var(--muted);
        font-size: 12px;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      .resize-edge {
        position: fixed;
        z-index: 1000;
      }

      .resize-right {
        top: 0;
        right: 0;
        width: 8px;
        height: 100%;
        cursor: ew-resize;
      }

      .resize-bottom {
        bottom: 0;
        left: 0;
        width: 100%;
        height: 8px;
        cursor: ns-resize;
      }

      .resize-corner {
        bottom: 0;
        right: 0;
        width: 16px;
        height: 16px;
        cursor: nwse-resize;
      }
    </style>
  </head>

  <body>
    <div class="header">
      <button class="back-button" id="backButton">←</button>
      <div class="icon">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="3" width="12" height="12" rx="2.5" stroke="#ffffff" stroke-width="2"/>
          <rect x="9" y="9" width="12" height="12" rx="2.5" stroke="#ffffff" stroke-width="2" fill="#3563e9"/>
        </svg>
      </div>
      <div>DesignTrace</div>
    </div>

    <div id="app" class="content"></div>

    <div class="resize-edge resize-right" id="resizeRight"></div>
    <div class="resize-edge resize-bottom" id="resizeBottom"></div>
    <div class="resize-edge resize-corner" id="resizeCorner"></div>

    <script>
      const app = document.getElementById("app");

      let matches = [];
      let selectedLayer = null;
      let activeMatch = null;
      let currentScreen = "empty";
      let currentPage = 1;
      const itemsPerPage = 10;
      let currentFilter = "all";
      let expandedMatchIndex = null;
      let scanProgress = 0;

      function navigate(screenName, renderFunction) {
        currentScreen = screenName;
        renderFunction();
        updateBackButton();
      }

      function updateBackButton() {
        const backButton = document.getElementById("backButton");
        if (!backButton) return;
        backButton.style.display = currentScreen === "empty" ? "none" : "";
      }

      function goBack() {
        if (currentScreen === "selected") {
          navigate("empty", renderEmpty);
          return;
        }

        if (currentScreen === "scanning" || currentScreen === "results") {
          navigate("selected", renderSelected);
          return;
        }

        navigate("empty", renderEmpty);
      }

      function confidenceClass(score) {
        if (score >= 80) return "high";
        if (score >= 50) return "medium";
        return "low";
      }

      function renderEmpty() {
        app.innerHTML = `
          <div class="empty">
            <div class="empty-inner">
              <div class="empty-icon">⌕</div>
              <div class="stack">
                <h1>Find matching designs</h1>
                <p>Select a layer to trace where it appears in this file.</p>
              </div>
              <button class="primary" id="checkSelection">Check selected layer</button>
              <div class="footer-note">Current Figma file only</div>
            </div>
          </div>
        `;

        document.getElementById("checkSelection").onclick = () => {
          parent.postMessage({ pluginMessage: { type: "check-selection" } }, "*");
        };
      }

      function selectedCard() {
        return `
          <div class="card">
            <div class="row">
              <div class="thumb"></div>
              <div class="stack" style="gap: 5px; min-width: 0;">
                <div class="eyebrow">Selected layer</div>
                <h1>${selectedLayer.name}</h1>
                <p>${selectedLayer.pageName}</p>
                <div class="row" style="gap: 6px; flex-wrap: wrap;">
                  <span class="chip">${selectedLayer.type}</span>
                  <span class="chip">${selectedLayer.width} × ${selectedLayer.height}</span>
                  <span class="chip">${selectedLayer.layers || "?"} layers</span>
                </div>
              </div>
            </div>
          </div>
        `;
      }

      function renderSelected() {
        app.innerHTML = `
          <div class="stack">
            ${selectedCard()}
            <div class="card settings">
              <div class="row between">
                <h2>Scan settings</h2>
                <p>Current file</p>
              </div>
              <div class="settings-grid">
                <label><input type="checkbox" checked /> Components</label>
                <label><input type="checkbox" checked /> Text</label>
                <label><input type="checkbox" checked /> Structure</label>
                <label><input type="checkbox" /> Frame names</label>
              </div>
            </div>
            <button class="primary" id="scanFile">Scan file</button>
            <button class="secondary" id="changeSelection">Change selection</button>
          </div>
        `;

        document.getElementById("scanFile").onclick = () => {
            scanProgress = 0;
            currentFilter = "all";
            currentPage = 1;
            expandedMatchIndex = null;
            navigate("scanning", renderScanning);
            parent.postMessage({ pluginMessage: { type: "scan-file" } }, "*");
        };
        document.getElementById("changeSelection").onclick = () => navigate("empty", renderEmpty);
      }

      function renderScanning() {
        app.innerHTML = `
          <div class="stack">
            ${selectedCard()}
            <div class="card stack">
              <h1>Scanning all pages…</h1>
              <div class="step"><span class="dot">✓</span> Reading selected layer</div>
              <div class="step"><span class="dot">✓</span> Comparing structure</div>
              <div class="step"><div class="loader"></div> Ranking matches <span id="scanProgressText" class="progress-text"></span></div>
            </div>
            <button class="primary" disabled>Scanning…</button>
          </div>
        `;

        // Set initial progress
        updateScanProgress();
      }

      function updateScanProgress() {
        const progressText = document.getElementById("scanProgressText");
        if (progressText) {
          progressText.textContent = scanProgress > 0 ? `(${scanProgress}%)` : '';
        }
      }

      function renderResults() {
        if (matches.length === 0) {
          app.innerHTML = `
            <div class="empty">
              <div class="empty-inner">
                <div class="empty-icon">⌕</div>
                <div class="stack">
                  <h1>No matches found</h1>
                  <p>Try selecting a larger frame. We'll tune the matching logic next.</p>
                </div>
                <button class="primary" id="backToSelected">Back to selected layer</button>
              </div>
            </div>
          `;

          document.getElementById("backToSelected").onclick = () => {
            navigate("selected", renderSelected);
          };

          return;
        }

        const filteredMatches = matches.filter((match) => {
          if (currentFilter === "high") return match.score >= 80;
          if (currentFilter === "medium") return match.score >= 50 && match.score < 80;
          if (currentFilter === "low") return match.score < 50;
          return true;
        });

        const totalPages = Math.ceil(filteredMatches.length / itemsPerPage);
        const startIndex = (currentPage - 1) * itemsPerPage;
        const endIndex = startIndex + itemsPerPage;
        const currentPageMatches = filteredMatches.slice(startIndex, endIndex);

        app.innerHTML = `
          <div class="summary">
            <div class="row between">
              <div>
                <h1>${filteredMatches.length} matches found</h1>
                <p>${matches.filter((match) => match.score >= 80).length} high confidence, ${matches.filter((match) => match.score >= 50 && match.score < 80).length} medium, ${matches.filter((match) => match.score < 50).length} low</p>
              </div>
            </div>
            <div class="filters">
              <button class="chip ${currentFilter === 'all' ? 'tag' : ''}" id="filterAll">All</button>
              <button class="chip ${currentFilter === 'high' ? 'tag' : ''}" id="filterHigh">High</button>
              <button class="chip ${currentFilter === 'medium' ? 'tag' : ''}" id="filterMedium">Medium</button>
              <button class="chip ${currentFilter === 'low' ? 'tag' : ''}" id="filterLow">Low</button>
            </div>
          </div>
          <div class="stack">
            ${currentPageMatches.map((match, index) => `
              <div class="match-row ${expandedMatchIndex === startIndex + index ? 'expanded' : ''}" data-index="${startIndex + index}" role="button" tabindex="0">
                <span class="score ${confidenceClass(match.score)}">${match.score}%</span>
                <div class="row">
                  <div class="thumb"></div>
                  <div class="match-copy">
                    <h2>${match.name}</h2>
                    <p>${match.page}</p>
                    <div class="tags">
                      ${match.reasons.slice(0, 2).map((reason) => `<span class="tag">${reason}</span>`).join("")}
                    </div>
                  </div>
                </div>
                <div class="match-actions">
                  <p class="action-hint">Adds a text label next to this layer — search "Design Trace" in your file to find it later.</p>
                  <button class="btn-flag" data-action="flag">🚩 Flag as outdated</button>
                  <button class="btn-review" data-action="reviewed">✓ Mark reviewed</button>
                </div>
              </div>
            `).join("")}
          </div>
          ${totalPages > 1 ? `
            <div class="card">
              <div class="row between">
                <button class="ghost" id="prevPage" ${currentPage === 1 ? 'disabled' : ''}>← Previous</button>
                <span class="page-indicator">Page ${currentPage} of ${totalPages}</span>
                <button class="ghost" id="nextPage" ${currentPage === totalPages ? 'disabled' : ''}>Next →</button>
              </div>
            </div>
          ` : ''}
        `;

        document.querySelectorAll(".match-row").forEach((row) => {
          row.addEventListener("keydown", (e) => {
            if (e.key === "Enter" || e.key === " ") {
              e.preventDefault();
              row.click();
            }
          });

          row.onclick = (e) => {
            const action = e.target.closest("[data-action]")?.dataset.action;
            const matchIndex = Number(row.dataset.index);
            const match = filteredMatches[matchIndex];

            if (action === "flag") {
              activeMatch = match;
              parent.postMessage({
                pluginMessage: {
                  type: "flag-match",
                  match: activeMatch
                }
              }, "*");
            } else if (action === "reviewed") {
              activeMatch = match;
              parent.postMessage({
                pluginMessage: {
                  type: "mark-reviewed",
                  match: activeMatch
                }
              }, "*");
            } else {
              // Toggle expansion and navigate to component
              if (expandedMatchIndex === matchIndex) {
                expandedMatchIndex = null;
              } else {
                expandedMatchIndex = matchIndex;
                activeMatch = match;
                parent.postMessage({
                  pluginMessage: {
                    type: "take-me-there",
                    match: activeMatch
                  }
                }, "*");
              }
              renderResults();
            }
          };
        });

        document.getElementById("filterAll").onclick = () => {
          currentFilter = "all";
          currentPage = 1;
          renderResults();
        };

        document.getElementById("filterHigh").onclick = () => {
          currentFilter = "high";
          currentPage = 1;
          renderResults();
        };

        document.getElementById("filterMedium").onclick = () => {
          currentFilter = "medium";
          currentPage = 1;
          renderResults();
        };

        document.getElementById("filterLow").onclick = () => {
          currentFilter = "low";
          currentPage = 1;
          renderResults();
        };

        if (totalPages > 1) {
          document.getElementById("prevPage").onclick = () => {
            if (currentPage > 1) {
              currentPage--;
              renderResults();
              setTimeout(() => {
                const summary = document.querySelector(".summary");
                if (summary) summary.scrollIntoView({ behavior: "smooth" });
              }, 0);
            }
          };

          document.getElementById("nextPage").onclick = () => {
            if (currentPage < totalPages) {
              currentPage++;
              renderResults();
              setTimeout(() => {
                const summary = document.querySelector(".summary");
                if (summary) summary.scrollIntoView({ behavior: "smooth" });
              }, 0);
            }
          };
        }
      }


      window.onmessage = (event) => {
        const message = event.data.pluginMessage;

        if (message.type === "no-selection") {
          navigate("empty", renderEmpty);
          alert("Select a layer in Figma first.");
        }

        if (message.type === "selection-found") {
          selectedLayer = {
            ...message.layer,
            layers: message.layer.layers || "?"
          };
          navigate("selected", renderSelected);
        }

        if (message.type === "scan-started") {
            navigate("scanning", renderScanning);
        }

        if (message.type === "scan-progress") {
          scanProgress = message.progress;
          if (currentScreen === "scanning") {
            updateScanProgress();
          }
        }

        if (message.type === "scan-results") {
            matches.length = 0;
            message.matches.forEach((match) => matches.push(match));
            currentPage = 1;
            currentFilter = "all";
            expandedMatchIndex = null;
            navigate("results", renderResults);
        }

        if (message.type === "taken-there") {
          // Match is now selected in Figma, no screen change needed
        }

        if (message.type === "flagged" || message.type === "reviewed") {
          // Match state changed in Figma, collapse the expanded row
          expandedMatchIndex = null;
          if (currentScreen === "results") renderResults();
        }

        if (message.type === "flag-failed") {
          alert(message.message || "Could not update that match.");
        }
      };

      document.getElementById("backButton").onclick = goBack;
      navigate("empty", renderEmpty);

      // Resize functionality
      const resizeRight = document.getElementById("resizeRight");
      const resizeBottom = document.getElementById("resizeBottom");
      const resizeCorner = document.getElementById("resizeCorner");

      let isResizing = false;
      let resizeDirection = null;
      let startX, startY, startWidth, startHeight;

      function startResize(e, direction) {
        isResizing = true;
        resizeDirection = direction;
        startX = e.clientX;
        startY = e.clientY;
        startWidth = window.innerWidth;
        startHeight = window.innerHeight;
        e.preventDefault();
      }

      resizeRight.addEventListener("mousedown", (e) => startResize(e, "horizontal"));
      resizeBottom.addEventListener("mousedown", (e) => startResize(e, "vertical"));
      resizeCorner.addEventListener("mousedown", (e) => startResize(e, "both"));

      document.addEventListener("mousemove", (e) => {
        if (!isResizing) return;

        let newWidth = startWidth;
        let newHeight = startHeight;

        if (resizeDirection === "horizontal" || resizeDirection === "both") {
          newWidth = startWidth + (e.clientX - startX);
        }

        if (resizeDirection === "vertical" || resizeDirection === "both") {
          newHeight = startHeight + (e.clientY - startY);
        }

        parent.postMessage({
          pluginMessage: {
            type: "resize",
            width: Math.max(300, newWidth),
            height: Math.max(200, newHeight)
          }
        }, "*");
      });

      document.addEventListener("mouseup", () => {
        isResizing = false;
        resizeDirection = null;
      });
    </script>
  </body>
</html>
